<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeSaathi — Tera Coding Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Hind:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surf:#0d0d1c;--surf2:#111120;--border:#151526;--border2:#1e1e32;
  --text:#e2e2f0;--muted:#44445e;--muted2:#33334a;
  --orange:#f97316;--indigo:#6366f1;--green:#10b981;
  --font:'Hind','Segoe UI','Noto Sans Devanagari',sans-serif;
  --mono:'JetBrains Mono',monospace;--mc:#6366f1;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 16px rgba(249,115,22,.25)}50%{box-shadow:0 0 28px rgba(249,115,22,.5)}}
#header{position:relative;z-index:30;background:rgba(7,7,15,.98);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:10px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;animation:glowPulse 3s infinite;}
.logo-name{font-family:'Baloo 2',cursive;font-size:19px;font-weight:900;background:linear-gradient(90deg,#f97316,#fbbf24,#f97316);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite;letter-spacing:-.3px;}
.logo-sub{font-size:9px;color:var(--muted2);letter-spacing:.1em;}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.lang-wrap{display:flex;background:var(--surf);border:1px solid var(--border2);border-radius:10px;padding:3px;gap:2px;}
.lang-btn{padding:5px 12px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .18s;background:transparent;color:var(--muted);min-width:36px;}
.lang-btn.active{color:#fff;}
.level-sel{background:var(--surf);border:1px solid var(--border2);border-radius:10px;padding:6px 10px;color:var(--text);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;outline:none;}
.level-sel option{background:var(--surf);}
#clear-btn{padding:6px 12px;border-radius:9px;border:1px solid rgba(239,68,68,.18);background:rgba(239,68,68,.07);color:#f87171;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);display:none;}
.mode-tabs{display:flex;gap:4px;padding:0 20px 11px;}
.mode-tab{padding:6px 15px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .18s;background:transparent;color:var(--muted);}
.mode-tab.active-tutor{background:rgba(99,102,241,.12);color:#818cf8;border-color:rgba(99,102,241,.3);}
.mode-tab.active-roadmap{background:rgba(249,115,22,.12);color:#fb923c;border-color:rgba(249,115,22,.3);}
.mode-tab.active-notes{background:rgba(16,185,129,.12);color:#34d399;border-color:rgba(16,185,129,.3);}
#topic-bar{display:flex;align-items:center;gap:5px;padding:7px 20px;background:rgba(7,7,15,.92);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;position:relative;z-index:20;}
#topic-bar::-webkit-scrollbar{display:none;}
.topic-label{font-size:9px;color:var(--muted2);font-family:var(--mono);white-space:nowrap;margin-right:4px;letter-spacing:.1em;}
.topic-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);}
.topic-btn:hover{border-color:var(--orange);color:var(--orange);}
.topic-btn.active{border-color:var(--orange);background:rgba(249,115,22,.1);color:var(--orange);}
#chat{flex:1;overflow-y:auto;padding:18px 20px 10px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;}
#welcome{display:flex;flex-direction:column;align-items:center;gap:18px;animation:fadeUp .4s ease;padding-top:6px;}
.mode-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px;}
.mode-card{flex:1 1 150px;padding:15px 12px;border-radius:13px;background:rgba(255,255,255,.015);border:1px solid var(--border);cursor:pointer;transition:all .2s;text-align:center;}
.mode-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.mode-card.active-tutor{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.35);}
.mode-card.active-roadmap{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.35);}
.mode-card.active-notes{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.35);}
.mc-icon{font-size:22px;margin-bottom:5px;}
.mc-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.mc-desc{font-size:11px;color:var(--muted);line-height:1.4;}
.greeting{text-align:center;max-width:420px;}
.greeting h2{font-family:'Baloo 2',cursive;font-size:21px;font-weight:800;margin-bottom:6px;}
.greeting p{font-size:13px;color:var(--muted);line-height:1.7;}
.ctx-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:#55557a;}
.ctx-sep{color:var(--border2);}
.quick-wrap{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:520px;}
.quick-btn{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .18s;font-family:var(--font);}
.quick-btn:hover{border-color:var(--mc);color:var(--mc);}
.msg{display:flex;gap:10px;animation:fadeUp .3s ease;max-width:88%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.ai{align-self:flex-start;}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.ai-av{background:linear-gradient(135deg,#f97316,#6366f1);}
.user-av{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.bubble{padding:12px 16px;font-size:14px;line-height:1.75;color:var(--text);border-radius:14px;}
.ai-bubble{background:rgba(10,14,12,.95);border:1px solid rgba(16,185,129,.14);border-top-left-radius:3px;}
.user-bubble{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.28);border-top-right-radius:3px;}
.bubble pre{background:#0a0a16;border:1px solid #252540;border-radius:10px;padding:13px 15px;margin:10px 0;overflow-x:auto;font-family:var(--mono);font-size:13px;color:#93c5fd;line-height:1.6;}
.bubble code{font-family:var(--mono);}
.inline-code{background:rgba(139,92,246,.18);color:#c4b5fd;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:.85em;}
.bubble strong{color:#fb923c;font-weight:700;}
.code-lang{display:block;color:#555580;font-size:10px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.dl-btn{margin-top:7px;padding:5px 14px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:7px;color:#34d399;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.dl-btn:hover{background:rgba(16,185,129,.18);}
.typing-msg{display:flex;gap:10px;align-self:flex-start;animation:fadeUp .2s ease;}
.typing-dots{padding:13px 17px;border-radius:14px;border-top-left-radius:3px;background:rgba(10,14,12,.95);border:1px solid rgba(16,185,129,.14);display:flex;gap:5px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.dot:nth-child(1){animation:bounce 1.2s 0s infinite;}
.dot:nth-child(2){animation:bounce 1.2s .2s infinite;}
.dot:nth-child(3){animation:bounce 1.2s .4s infinite;}
#input-area{position:relative;z-index:30;padding:10px 20px 14px;background:rgba(7,7,15,.99);border-top:1px solid var(--border);flex-shrink:0;}
.input-ctx{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.input-ctx span{font-size:10px;color:var(--muted2);}
.ctx-badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 8px;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--surf);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--mc);}
#msg-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;line-height:1.55;font-family:var(--font);resize:none;min-height:24px;max-height:110px;overflow-y:auto;}
#msg-input::placeholder{color:var(--muted);}
#send-btn{width:44px;height:44px;border-radius:11px;flex-shrink:0;border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 0 14px rgba(249,115,22,.35);}
#send-btn:disabled{background:var(--surf2);box-shadow:none;cursor:not-allowed;}
#send-btn:not(:disabled):hover{transform:scale(1.06);}
.input-hint{text-align:center;font-size:10px;color:var(--muted2);margin-top:6px;}
</style>
</head>
<body>

<div id="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🧑‍💻</div>
      <div>
        <div class="logo-name">CodeSaathi</div>
        <div class="logo-sub">TERA CODING COMPANION</div>
      </div>
    </div>
    <div class="controls">
      <div class="lang-wrap">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        data-lang="hi" onclick="setLang('hi')">हि</button>
        <button class="lang-btn"        data-lang="mr" onclick="setLang('mr')">म</button>
      </div>
      <select class="level-sel" id="level-sel" onchange="level=this.value">
        <option value="beginner">🟢 Beginner</option>
        <option value="intermediate">🟡 Intermediate</option>
        <option value="advanced">🔴 Advanced</option>
      </select>
      <button id="clear-btn" onclick="clearChat()">🗑 Clear</button>
    </div>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active-tutor"   data-mode="tutor"   onclick="setMode('tutor')">🤖 AI Tutor</button>
    <button class="mode-tab"                data-mode="roadmap" onclick="setMode('roadmap')">🗺️ Roadmap</button>
    <button class="mode-tab"                data-mode="notes"   onclick="setMode('notes')">📝 Notes</button>
  </div>
</div>

<div id="topic-bar">
  <span class="topic-label">TOPIC</span>
  <button class="topic-btn active" data-topic="General"    onclick="setTopic(this,'General')">💬 General</button>
  <button class="topic-btn"        data-topic="Python"     onclick="setTopic(this,'Python')">🐍 Python</button>
  <button class="topic-btn"        data-topic="JavaScript" onclick="setTopic(this,'JavaScript')">⚡ JavaScript</button>
  <button class="topic-btn"        data-topic="HTML & CSS" onclick="setTopic(this,'HTML & CSS')">🎨 HTML & CSS</button>
  <button class="topic-btn"        data-topic="C++"        onclick="setTopic(this,'C++')">⚙️ C++</button>
  <button class="topic-btn"        data-topic="C"          onclick="setTopic(this,'C')">🔧 C</button>
  <button class="topic-btn"        data-topic="Java"       onclick="setTopic(this,'Java')">☕ Java</button>
  <button class="topic-btn"        data-topic="SQL"        onclick="setTopic(this,'SQL')">🗄️ SQL</button>
  <button class="topic-btn"        data-topic="DSA"        onclick="setTopic(this,'DSA')">🧩 DSA</button>
  <button class="topic-btn"        data-topic="Git"        onclick="setTopic(this,'Git')">🌿 Git</button>
</div>

<div id="chat"></div>

<div id="input-area">
  <div class="input-ctx">
    <span>Active:</span>
    <span class="ctx-badge" id="ctx-badge">🤖 AI Tutor</span>
    <span style="color:#252540">•</span>
    <span id="ctx-topic">💬 General</span>
    <span style="color:#252540">•</span>
    <span id="ctx-lang">English</span>
  </div>
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1"
        placeholder="Ask any coding question..."
        onkeydown="handleKey(event)"
        oninput="autoGrow(this)"></textarea>
    </div>
    <button id="send-btn" onclick="sendMsg()" disabled>🚀</button>
  </div>
  <div class="input-hint">Enter to send • Shift+Enter for new line • Switch language anytime</div>
</div>

<script>
// ── BACKEND URL ────────────────────────────────────────────────
const BACKEND_URL = "https://codesaathi-uc35.onrender.com";

// ── STATE ──────────────────────────────────────────────────────
let lang    = "en";
let level   = "beginner";
let topic   = "General";
let mode    = "tutor";
let history = [];
let loading = false;
let notesTopic = "Notes";

const MC = { tutor:"#6366f1", roadmap:"#f97316", notes:"#10b981" };
const langFull   = { en:"English", hi:"Hindi", mr:"Marathi" };
const topicIcons = { General:"💬",Python:"🐍",JavaScript:"⚡","HTML & CSS":"🎨","C++":"⚙️",C:"🔧",Java:"☕",SQL:"🗄️",DSA:"🧩",Git:"🌿" };
const modeEmoji  = { tutor:"🤖", roadmap:"🗺️", notes:"📝" };
const modeLabel  = { tutor:"AI Tutor", roadmap:"Roadmap", notes:"Notes" };
const modeDesc   = {
  tutor:   "Koi bhi coding concept simply samjha deta hoon. Pooch jo bhi man mein aaye!",
  roadmap: "Kisi bhi skill ka step-by-step roadmap banata hoon — job-ready banne ke liye!",
  notes:   "Kisi bhi topic ke detailed notes banata hoon — download karke padh sakte ho!",
};
const QUICK = {
  tutor:   ["Variable kya hota hai? Real life example do","What is a function? Explain like I am 15","Loop kya hota hai? Simple explain karo","HTML aur CSS mein kya farak hai?","How to get a web dev job in India?","Array aur List mein difference kya hai?"],
  roadmap: ["Python roadmap for complete beginners","Web development roadmap to get a job","DSA roadmap for college placements","Full stack developer roadmap 2025","Data science roadmap for students"],
  notes:   ["Notes on Python basics and syntax","Notes on HTML and CSS fundamentals","Notes on JavaScript arrays and objects","Notes on OOP concepts with examples","Notes on all important Git commands"],
};
const PH = {
  tutor:   {en:"Ask any coding question...",hi:"Koi bhi coding sawaal pooch...",mr:"Koni hi coding prashna vichar..."},
  roadmap: {en:"e.g. Python roadmap to get a job",hi:"e.g. Python ka roadmap do...",mr:"e.g. Python roadmap dya..."},
  notes:   {en:"e.g. Notes on JavaScript arrays",hi:"e.g. JavaScript arrays ke notes banao",mr:"e.g. JavaScript arrays notes banva..."},
};

function buildSystem() {
  const LR = {
    en:"You MUST respond entirely in English only.",
    hi:"You MUST respond entirely in Hindi (Devanagari script). Technical terms can stay in English but ALL explanations must be in Hindi.",
    mr:"You MUST respond entirely in Marathi (Devanagari script). Technical terms can stay in English but ALL explanations must be in Marathi.",
  }[lang];
  const LVL = {
    beginner:"Explain like a 10th standard student (age 15). Simple words. Indian analogies (chai, cricket, Bollywood). Very warm and encouraging.",
    intermediate:"Explain like a 1st/2nd year college student. Technical terms ok but explain them. Short code examples.",
    advanced:"Professional developer level. Correct terminology, best practices, edge cases.",
  }[level];
  if (mode==="roadmap") return `You are CodeSaathi, a friendly Indian coding tutor.\nLANGUAGE (MANDATORY): ${LR}\nLEVEL: ${LVL}\nGenerate a structured learning roadmap with phases, time estimates, resources, and job outcomes. Use **bold** headings and emojis.`;
  if (mode==="notes")   return `You are CodeSaathi, a friendly Indian coding tutor.\nLANGUAGE (MANDATORY): ${LR}\nLEVEL: ${LVL}\nTOPIC: ${topic}\nGenerate complete study notes: numbered sections, definitions, code examples, summary.`;
  return `You are CodeSaathi — warm friendly AI coding tutor for Indian students.\nLANGUAGE (MANDATORY): ${LR}\nLEVEL: ${LVL}\nTOPIC: ${topic}\nBe warm, encouraging. Use emojis. Explain WHAT/WHY/HOW. Short paragraphs.\nMISSION: Make students feel "Main bhi code kar sakta/sakti hoon!" 🚀`;
}

function setLang(l) {
  lang = l;
  document.querySelectorAll(".lang-btn").forEach(b => {
    const on = b.dataset.lang === l;
    b.classList.toggle("active", on);
    b.style.background = on ? MC[mode] : "transparent";
    b.style.color      = on ? "#fff" : "#55557a";
    b.style.boxShadow  = on ? `0 2px 10px ${MC[mode]}55` : "none";
  });
  document.getElementById("ctx-lang").textContent = langFull[l];
  document.getElementById("msg-input").placeholder = PH[mode][l];
}

function setTopic(btn, t) {
  topic = t;
  document.querySelectorAll(".topic-btn").forEach(b => b.classList.toggle("active", b.dataset.topic === t));
  document.getElementById("ctx-topic").textContent = (topicIcons[t]||"💬") + " " + t;
}

function setMode(m) {
  mode = m; history = [];
  document.querySelectorAll(".mode-tab").forEach(b => {
    b.className = "mode-tab" + (b.dataset.mode === m ? ` active-${m}` : "");
  });
  document.documentElement.style.setProperty("--mc", MC[m]);
  setLang(lang);
  const badge = document.getElementById("ctx-badge");
  badge.textContent = modeEmoji[m] + " " + modeLabel[m];
  badge.style.background = MC[m] + "18";
  badge.style.border     = `1px solid ${MC[m]}35`;
  badge.style.color      = MC[m];
  document.getElementById("msg-input").placeholder = PH[m][lang];
  renderWelcome();
}

function renderWelcome() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  const w = document.createElement("div"); w.id = "welcome";
  const cards = document.createElement("div"); cards.className = "mode-cards";
  ["tutor","roadmap","notes"].forEach(m2 => {
    const c = document.createElement("div");
    c.className = "mode-card" + (mode===m2 ? ` active-${m2}` : "");
    c.innerHTML = `<div class="mc-icon">${modeEmoji[m2]}</div><div class="mc-title" style="color:${mode===m2?MC[m2]:"var(--text)"}">${modeLabel[m2]}</div><div class="mc-desc">${modeDesc[m2]}</div>`;
    c.onclick = () => setMode(m2);
    cards.appendChild(c);
  });
  w.appendChild(cards);
  const g = document.createElement("div"); g.className = "greeting";
  g.innerHTML = `<h2>Namaste! Main hoon <span style="color:var(--orange)">CodeSaathi</span> 👋</h2><p>${modeDesc[mode]}</p>`;
  w.appendChild(g);
  const pill = document.createElement("div"); pill.className = "ctx-pill";
  pill.innerHTML = `<span>${topicIcons[topic]||"💬"} ${topic}</span><span class="ctx-sep">•</span><span>${document.getElementById("level-sel").options[document.getElementById("level-sel").selectedIndex].text}</span><span class="ctx-sep">•</span><span>${langFull[lang]}</span>`;
  w.appendChild(pill);
  const qw = document.createElement("div"); qw.className = "quick-wrap";
  QUICK[mode].forEach(q => {
    const btn = document.createElement("button"); btn.className = "quick-btn";
    btn.textContent = (mode==="tutor"?"💬":mode==="roadmap"?"🗺️":"📝") + " " + (q.length>38?q.slice(0,38)+"…":q);
    btn.onclick = () => sendMsg(q);
    qw.appendChild(btn);
  });
  w.appendChild(qw);
  chat.appendChild(w);
  document.getElementById("clear-btn").style.display = "none";
}

function clearChat(){ history=[]; renderWelcome(); }

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtInline(t){ retur
