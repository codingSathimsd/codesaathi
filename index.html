<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CodeSaathi — Tera Coding Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Hind:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surf:#0d0d1c;--border:#1e1e32;
  --text:#e2e2f0;--muted:#55557a;--muted2:#33334a;
  --orange:#f97316;--indigo:#6366f1;--green:#10b981;
  --font:'Hind','Segoe UI','Noto Sans Devanagari',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;width:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes glow{0%,100%{box-shadow:0 0 14px rgba(249,115,22,.3)}50%{box-shadow:0 0 26px rgba(249,115,22,.6)}}

/* ── HEADER ── */
#header{background:#0a0a14;border-bottom:1px solid var(--border);flex-shrink:0;z-index:50}
.header-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#f97316,#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;animation:glow 3s infinite;flex-shrink:0}
.logo-name{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;background:linear-gradient(90deg,#f97316,#fbbf24,#f97316);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.logo-sub{font-size:8px;color:var(--muted2);letter-spacing:.1em;margin-top:-2px}
.controls{display:flex;align-items:center;gap:6px}

/* Language buttons */
.lang-wrap{display:flex;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang-btn{padding:6px 11px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);background:transparent;color:var(--muted);transition:all .15s;min-width:34px;-webkit-tap-highlight-color:transparent}
.lang-btn.on{color:#fff}

.level-sel{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;outline:none;-webkit-appearance:none}
.level-sel option{background:#0d0d1c}

/* Mode tabs */
.mode-row{display:flex;gap:4px;padding:0 16px 10px}
.mode-tab{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);background:transparent;color:var(--muted);transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent}
.mode-tab.t-on{background:rgba(99,102,241,.15);color:#818cf8;border-color:rgba(99,102,241,.4)}
.mode-tab.r-on{background:rgba(249,115,22,.15);color:#fb923c;border-color:rgba(249,115,22,.4)}
.mode-tab.n-on{background:rgba(16,185,129,.15);color:#34d399;border-color:rgba(16,185,129,.4)}

/* Topic bar */
#topic-bar{display:flex;align-items:center;gap:5px;padding:6px 16px;background:#0a0a14;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#topic-bar::-webkit-scrollbar{display:none}
.t-label{font-size:9px;color:var(--muted2);font-family:var(--mono);white-space:nowrap;margin-right:2px;letter-spacing:.1em}
.t-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.t-btn.on{border-color:#f97316;background:rgba(249,115,22,.12);color:#f97316}

/* ── CHAT ── */
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}

/* Welcome */
#welcome{display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeUp .4s ease;width:100%}
.w-title{text-align:center;padding:0 10px}
.w-title h2{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;margin-bottom:6px;line-height:1.3}
.w-title p{font-size:13px;color:var(--muted);line-height:1.6}

/* Mode cards */
.m-cards{display:flex;gap:8px;width:100%;max-width:500px}
.m-card{flex:1;padding:12px 8px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid var(--border);cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.m-card-icon{font-size:20px;margin-bottom:4px}
.m-card-title{font-size:12px;font-weight:700;margin-bottom:2px}
.m-card-desc{font-size:10px;color:var(--muted);line-height:1.3}
.m-card.t-active{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.4)}
.m-card.r-active{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.4)}
.m-card.n-active{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.4)}

/* Context pill */
.ctx-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted)}
.ctx-sep{color:var(--border)}

/* Quick buttons */
.q-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%;max-width:500px;padding:0 4px}
.q-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s;-webkit-tap-highlight-color:transparent}

/* Messages */
.msg{display:flex;gap:8px;max-width:90%;animation:fadeUp .25s ease}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.a{align-self:flex-start}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:14px}
.av.a-av{background:linear-gradient(135deg,#f97316,#6366f1)}
.av.u-av{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.bub{padding:10px 14px;font-size:14px;line-height:1.7;border-radius:14px;word-break:break-word}
.bub.a-b{background:rgba(10,16,12,.98);border:1px solid rgba(16,185,129,.15);border-top-left-radius:3px}
.bub.u-b{background:rgba(99,102,241,.13);border:1px solid rgba(99,102,241,.3);border-top-right-radius:3px}
.bub pre{background:#080812;border:1px solid #1e1e38;border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;color:#93c5fd;line-height:1.5}
.bub code{font-family:var(--mono)}
.ic{background:rgba(139,92,246,.2);color:#c4b5fd;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:.85em}
.bub strong{color:#fb923c;font-weight:700}
.cl{display:block;color:#444466;font-size:9px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}

/* Download button */
.dl-btn{margin-top:6px;padding:5px 12px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:7px;color:#34d399;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent}

/* Typing */
.typ-msg{display:flex;gap:8px;align-self:flex-start;animation:fadeUp .2s ease}
.typ-dots{padding:12px 16px;border-radius:14px;border-top-left-radius:3px;background:rgba(10,16,12,.98);border:1px solid rgba(16,185,129,.15);display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dot:nth-child(1){animation:bounce 1.2s 0s infinite}
.dot:nth-child(2){animation:bounce 1.2s .2s infinite}
.dot:nth-child(3){animation:bounce 1.2s .4s infinite}

/* ── INPUT ── */
#input-area{background:#0a0a14;border-top:1px solid var(--border);padding:10px 16px 14px;flex-shrink:0;z-index:50}
.i-ctx{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.i-ctx span{font-size:10px;color:var(--muted2)}
.i-badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px}
.i-row{display:flex;gap:8px;align-items:flex-end}
.i-wrap{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:10px 13px;transition:border-color .2s}
.i-wrap:focus-within{border-color:#6366f1}
#msg-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;line-height:1.5;font-family:var(--font);resize:none;min-height:24px;max-height:100px;overflow-y:auto;-webkit-appearance:none}
#msg-input::placeholder{color:var(--muted)}
#send-btn{width:44px;height:44px;border-radius:11px;flex-shrink:0;border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 0 12px rgba(249,115,22,.35);-webkit-tap-highlight-color:transparent}
#send-btn:disabled{background:#1a1a2e;box-shadow:none;cursor:not-allowed}
.i-hint{text-align:center;font-size:10px;color:var(--muted2);margin-top:6px}

/* Clear btn */
#clr-btn{padding:5px 10px;border-radius:7px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.07);color:#f87171;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);display:none;-webkit-tap-highlight-color:transparent}

/* Desktop */
@media(min-width:600px){
  .header-row1{padding:12px 24px}
  .mode-row{padding:0 24px 12px}
  #topic-bar{padding:7px 24px}
  #chat{padding:20px 24px}
  #input-area{padding:12px 24px 16px}
  .w-title h2{font-size:24px}
  .m-card{padding:16px 14px}
  .m-card-icon{font-size:24px}
  .m-card-title{font-size:13px}
  .m-card-desc{font-size:11px}
  .bub{font-size:14px}
  .msg{max-width:80%}
  .q-btn{font-size:12px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-row1">
    <div class="logo">
      <div class="logo-icon">🧑‍💻</div>
      <div>
        <div class="logo-name">CodeSaathi</div>
        <div class="logo-sub">TERA CODING COMPANION</div>
      </div>
    </div>
    <div class="controls">
      <!-- Language -->
      <div class="lang-wrap">
        <button class="lang-btn on" id="lb-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn"   id="lb-hi" onclick="setLang('hi')">हि</button>
        <button class="lang-btn"   id="lb-mr" onclick="setLang('mr')">म</button>
      </div>
      <!-- Level -->
      <select class="level-sel" id="lvl-sel" onchange="level=this.value;updateCtx()">
        <option value="beginner">🟢 Beginner</option>
        <option value="intermediate">🟡 Intermediate</option>
        <option value="advanced">🔴 Advanced</option>
      </select>
      <!-- Clear -->
      <button id="clr-btn" onclick="clearChat()">🗑</button>
    </div>
  </div>
  <!-- Modes -->
  <div class="mode-row">
    <button class="mode-tab t-on" id="mt-tutor"   onclick="setMode('tutor')">🤖 AI Tutor</button>
    <button class="mode-tab"      id="mt-roadmap" onclick="setMode('roadmap')">🗺️ Roadmap</button>
    <button class="mode-tab"      id="mt-notes"   onclick="setMode('notes')">📝 Notes</button>
  </div>
</div>

<!-- TOPIC BAR -->
<div id="topic-bar">
  <span class="t-label">TOPIC</span>
  <button class="t-btn on" onclick="setTopic(this,'General')">💬 General</button>
  <button class="t-btn"    onclick="setTopic(this,'Python')">🐍 Python</button>
  <button class="t-btn"    onclick="setTopic(this,'JavaScript')">⚡ JavaScript</button>
  <button class="t-btn"    onclick="setTopic(this,'HTML & CSS')">🎨 HTML & CSS</button>
  <button class="t-btn"    onclick="setTopic(this,'C++')">⚙️ C++</button>
  <button class="t-btn"    onclick="setTopic(this,'C')">🔧 C</button>
  <button class="t-btn"    onclick="setTopic(this,'Java')">☕ Java</button>
  <button class="t-btn"    onclick="setTopic(this,'SQL')">🗄️ SQL</button>
  <button class="t-btn"    onclick="setTopic(this,'DSA')">🧩 DSA</button>
  <button class="t-btn"    onclick="setTopic(this,'Git')">🌿 Git</button>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="input-area">
  <div class="i-ctx">
    <span>Active:</span>
    <span class="i-badge" id="i-badge">🤖 AI Tutor</span>
    <span style="color:#252540">•</span>
    <span id="i-topic">💬 General</span>
    <span style="color:#252540">•</span>
    <span id="i-lang">English</span>
  </div>
  <div class="i-row">
    <div class="i-wrap" id="i-wrap">
      <textarea id="msg-input" rows="1"
        placeholder="Ask any coding question..."
        onkeydown="handleKey(event)"
        oninput="autoGrow(this)"></textarea>
    </div>
    <button id="send-btn" onclick="sendMsg()" disabled>🚀</button>
  </div>
  <div class="i-hint">Enter to send • Shift+Enter new line</div>
</div>

<script>
// ── BACKEND ────────────────────────────────────────────────────
const BACKEND = "https://codesaathi-uc35.onrender.com";

// ── STATE ──────────────────────────────────────────────────────
let lang  = "en", level = "beginner", topic = "General", mode = "tutor";
let history = [], loading = false, notesTopic = "Notes";

const MC = {tutor:"#6366f1", roadmap:"#f97316", notes:"#10b981"};
const LF = {en:"English", hi:"Hindi", mr:"Marathi"};
const TI = {General:"💬",Python:"🐍",JavaScript:"⚡","HTML & CSS":"🎨","C++":"⚙️",C:"🔧",Java:"☕",SQL:"🗄️",DSA:"🧩",Git:"🌿"};
const ME = {tutor:"🤖", roadmap:"🗺️", notes:"📝"};
const ML = {tutor:"AI Tutor", roadmap:"Roadmap", notes:"Notes"};
const MD = {
  tutor:  "Koi bhi coding concept simply samjha deta hoon. Pooch jo bhi man mein aaye!",
  roadmap:"Kisi bhi skill ka roadmap banata hoon — job-ready banne ke liye!",
  notes:  "Kisi bhi topic ke detailed notes banata hoon — download kar sakte ho!",
};
const QK = {
  tutor:  ["Variable kya hota hai? Real life example do","What is a function? Explain like I am 15","Loop kya hota hai? Simple explain karo","HTML aur CSS mein kya farak hai?","How to get a web dev job in India?","Array vs List mein kya difference hai?"],
  roadmap:["Python roadmap for complete beginners","Web development roadmap to get a job","DSA roadmap for college placements","Full stack developer roadmap 2025","Data science roadmap for students"],
  notes:  ["Notes on Python basics","Notes on HTML and CSS","Notes on JavaScript arrays","Notes on OOP concepts","Notes on Git commands"],
};
const PH = {
  tutor:  {en:"Ask any coding question...",  hi:"Koi bhi sawaal pooch...",    mr:"Koni hi prashna vichar..."},
  roadmap:{en:"e.g. Python roadmap...",       hi:"e.g. Python roadmap do...",  mr:"e.g. Python roadmap dya..."},
  notes:  {en:"e.g. Notes on JS arrays...",   hi:"e.g. JS arrays ke notes...", mr:"e.g. JS arrays notes..."},
};

// ── SYSTEM PROMPT ──────────────────────────────────────────────
function sys() {
  const LR = {
    en:"Respond ONLY in English.",
    hi:"Respond ONLY in Hindi (Devanagari). Technical terms can stay in English but ALL explanations must be in Hindi.",
    mr:"Respond ONLY in Marathi (Devanagari). Technical terms can stay in English but ALL explanations must be in Marathi.",
  }[lang];
  const LV = {
    beginner:    "Explain like a 10th standard student (age 15). Simple words. Indian analogies like chai, cricket, Bollywood. Very warm and encouraging.",
    intermediate:"Explain like a 1st/2nd year college student. Technical terms ok but explain them. Short code examples.",
    advanced:    "Professional developer level. Correct terminology, best practices, edge cases.",
  }[level];
  if(mode==="roadmap") return `You are CodeSaathi, a friendly Indian coding tutor.\nLANGUAGE: ${LR}\nLEVEL: ${LV}\nGenerate a structured roadmap with phases, time estimates, resources, job outcomes. Use **bold** headings.`;
  if(mode==="notes")   return `You are CodeSaathi, a friendly Indian coding tutor.\nLANGUAGE: ${LR}\nLEVEL: ${LV}\nTOPIC: ${topic}\nGenerate complete study notes with numbered sections, definitions, code examples, summary.`;
  return `You are CodeSaathi — warm, friendly AI coding tutor for Indian students.\nLANGUAGE: ${LR}\nLEVEL: ${LV}\nTOPIC: ${topic}\nBe warm and encouraging. Use emojis. Explain WHAT/WHY/HOW. Short paragraphs.\nMISSION: Make every student feel "Main bhi code kar sakta hoon!" 🚀`;
}

// ── SETTERS ────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  ["en","hi","mr"].forEach(x => {
    const b = document.getElementById("lb-"+x);
    b.classList.toggle("on", x===l);
    b.style.background = x===l ? MC[mode] : "transparent";
    b.style.color      = x===l ? "#fff"   : "#55557a";
  });
  document.getElementById("i-lang").textContent = LF[l];
  document.getElementById("msg-input").placeholder = PH[mode][l];
  updateCtx();
}

function setTopic(btn, t) {
  topic = t;
  document.querySelectorAll(".t-btn").forEach(b => b.classList.toggle("on", b===btn));
  document.getElementById("i-topic").textContent = (TI[t]||"💬")+" "+t;
  updateCtx();
}

function setMode(m) {
  mode = m; history = [];
  // tabs
  document.querySelectorAll(".mode-tab").forEach(b => b.className = "mode-tab");
  const cls = {tutor:"t-on", roadmap:"r-on", notes:"n-on"};
  document.getElementById("mt-"+m).classList.add(cls[m]);
  // lang btn color
  setLang(lang);
  // badge
  updateBadge();
  // placeholder
  document.getElementById("msg-input").placeholder = PH[m][lang];
  // re-render
  renderWelcome();
}

function updateBadge() {
  const b = document.getElementById("i-badge");
  b.textContent = ME[mode]+" "+ML[mode];
  b.style.background = MC[mode]+"18";
  b.style.border = `1px solid ${MC[mode]}35`;
  b.style.color  = MC[mode];
  // input focus color
  document.getElementById("i-wrap").style.setProperty("--fc", MC[mode]);
}

function updateCtx() {
  const pill = document.getElementById("ctx-pill-el");
  if(pill) pill.innerHTML = ctxPillHTML();
}

function ctxPillHTML() {
  const lv = document.getElementById("lvl-sel");
  return `<span>${TI[topic]||"💬"} ${topic}</span><span class="ctx-sep">•</span><span>${lv.options[lv.selectedIndex].text}</span><span class="ctx-sep">•</span><span>${LF[lang]}</span>`;
}

// ── WELCOME ────────────────────────────────────────────────────
function renderWelcome() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  document.getElementById("clr-btn").style.display = "none";

  const w = document.createElement("div");
  w.id = "welcome";

  // Mode cards
  const cards = document.createElement("div");
  cards.className = "m-cards";
  const modeClass = {tutor:"t-active", roadmap:"r-active", notes:"n-active"};
  const modeColor2 = {tutor:"#818cf8", roadmap:"#fb923c", notes:"#34d399"};
  [{id:"tutor",desc:"Ask anything, get simple answers"},{id:"roadmap",desc:"Get a learning path"},{id:"notes",desc:"Generate & download notes"}].forEach(m2 => {
    const c = document.createElement("div");
    c.className = "m-card" + (mode===m2.id ? " "+modeClass[m2.id] : "");
    c.innerHTML = `<div class="m-card-icon">${ME[m2.id]}</div><div class="m-card-title" style="color:${mode===m2.id?modeColor2[m2.id]:"var(--text)"}">${ML[m2.id]}</div><div class="m-card-desc">${m2.desc}</div>`;
    c.onclick = () => setMode(m2.id);
    cards.appendChild(c);
  });
  w.appendChild(cards);

  // Title
  const t = document.createElement("div");
  t.className = "w-title";
  t.innerHTML = `<h2>Namaste! Main hoon <span style="color:#f97316">CodeSaathi</span> 👋</h2><p>${MD[mode]}</p>`;
  w.appendChild(t);

  // Context pill
  const pill = document.createElement("div");
  pill.className = "ctx-pill";
  pill.id = "ctx-pill-el";
  pill.innerHTML = ctxPillHTML();
  w.appendChild(pill);

  // Quick starters
  const qw = document.createElement("div");
