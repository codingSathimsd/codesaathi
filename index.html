<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CodeSaathi — Tera Coding Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Hind:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f;--surf:#0e0e1c;--border:#1e1e34;
  --text:#e2e2f0;--muted:#55557a;--dim:#33334a;
  --orange:#f97316;--indigo:#6366f1;--green:#10b981;
  --font:'Hind','Segoe UI','Noto Sans Devanagari',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes glow{0%,100%{box-shadow:0 0 14px rgba(249,115,22,.3)}50%{box-shadow:0 0 28px rgba(249,115,22,.6)}}

#hdr{background:#09091a;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr1{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:9px}
.logo-ic{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#f97316,#6366f1);display:flex;align-items:center;justify-content:center;font-size:17px;animation:glow 3s infinite;flex-shrink:0}
.logo-nm{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;background:linear-gradient(90deg,#f97316,#fbbf24,#f97316);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.logo-sb{font-size:8px;color:var(--dim);letter-spacing:.1em}
.ctrl{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lw{display:flex;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lb{padding:7px 12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:transparent;color:var(--muted);transition:background .15s,color .15s;min-width:36px;line-height:1}
.lvl{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;outline:none}
.lvl option{background:var(--surf)}
#clr{padding:6px 10px;border-radius:7px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);display:none}
.mrow{display:flex;gap:5px;padding:0 16px 10px}
.mtab{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);background:transparent;color:var(--muted);transition:all .15s;text-align:center}
#tbar{display:flex;align-items:center;gap:5px;padding:7px 16px;background:#09091a;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#tbar::-webkit-scrollbar{display:none}
.tlbl{font-size:9px;color:var(--dim);font-family:var(--mono);white-space:nowrap;margin-right:3px;letter-spacing:.1em}
.tbtn{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);transition:all .15s;flex-shrink:0}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
#wel{display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadeUp .4s ease;width:100%}
.mcards{display:flex;gap:8px;width:100%;max-width:480px}
.mcard{flex:1;padding:12px 8px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid var(--border);cursor:pointer;transition:all .2s;text-align:center}
.mcard-ic{font-size:20px;margin-bottom:4px}
.mcard-nm{font-size:12px;font-weight:700;margin-bottom:3px}
.mcard-ds{font-size:10px;color:var(--muted);line-height:1.3}
.wtitle{text-align:center;max-width:420px;padding:0 8px}
.wtitle h2{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;margin-bottom:6px;line-height:1.3}
.wtitle p{font-size:13px;color:var(--muted);line-height:1.6}
.cpill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--muted);flex-wrap:wrap;justify-content:center}
.qwrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:480px}
.qbtn{padding:6px 12px;border-radius:20px;font-size:11px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .15s}
.msg{display:flex;gap:8px;max-width:92%;animation:fadeUp .25s ease}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.a{align-self:flex-start}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:14px}
.aav{background:linear-gradient(135deg,#f97316,#6366f1)}
.uav{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.bub{padding:11px 14px;font-size:14px;line-height:1.75;border-radius:14px;word-break:break-word}
.ab{background:rgba(8,14,10,.98);border:1px solid rgba(16,185,129,.15);border-top-left-radius:3px}
.ub{background:rgba(99,102,241,.13);border:1px solid rgba(99,102,241,.3);border-top-right-radius:3px}
.bub pre{background:#070710;border:1px solid #1e1e38;border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;color:#93c5fd;line-height:1.5}
.bub code{font-family:var(--mono)}
.ic{background:rgba(139,92,246,.2);color:#c4b5fd;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:.85em}
.bub strong{color:#fb923c;font-weight:700}
.clng{display:block;color:#444466;font-size:9px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.dlbtn{margin-top:6px;padding:5px 12px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:7px;color:#34d399;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:4px}
.typmsg{display:flex;gap:8px;align-self:flex-start}
.typdots{padding:12px 16px;border-radius:14px;border-top-left-radius:3px;background:rgba(8,14,10,.98);border:1px solid rgba(16,185,129,.15);display:flex;gap:5px;align-items:center}
.d{width:7px;height:7px;border-radius:50%;background:var(--green)}
.d:nth-child(1){animation:dotBounce 1.2s 0s infinite}
.d:nth-child(2){animation:dotBounce 1.2s .2s infinite}
.d:nth-child(3){animation:dotBounce 1.2s .4s infinite}
#iarea{background:#09091a;border-top:1px solid var(--border);padding:10px 16px 14px;flex-shrink:0}
.ictx{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.ictx span{font-size:10px;color:var(--dim)}
.ibadge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 8px}
.irow{display:flex;gap:8px;align-items:flex-end}
.iwrap{flex:1;background:var(--surf);border:2px solid var(--border);border-radius:12px;padding:10px 13px;transition:border-color .2s}
#inp{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;line-height:1.5;font-family:var(--font);resize:none;min-height:24px;max-height:100px;overflow-y:auto}
#inp::placeholder{color:var(--muted)}
#sbtn{width:46px;height:46px;border-radius:11px;flex-shrink:0;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 0 12px rgba(249,115,22,.4);transition:all .2s}
#sbtn:disabled{background:#1a1a2e;box-shadow:none;cursor:not-allowed}
.ihint{text-align:center;font-size:10px;color:var(--dim);margin-top:6px}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr1">
    <div class="logo">
      <div class="logo-ic">🧑‍💻</div>
      <div>
        <div class="logo-nm">CodeSaathi</div>
        <div class="logo-sb">TERA CODING COMPANION</div>
      </div>
    </div>
    <div class="ctrl">
      <div class="lw">
        <button class="lb" id="lb-en">EN</button>
        <button class="lb" id="lb-hi">हि</button>
        <button class="lb" id="lb-mr">म</button>
      </div>
      <select class="lvl" id="lvlsel">
        <option value="beginner">🟢 Beginner</option>
        <option value="intermediate">🟡 Intermediate</option>
        <option value="advanced">🔴 Advanced</option>
      </select>
      <button id="clr">🗑</button>
    </div>
  </div>
  <div class="mrow">
    <button class="mtab" id="mt-tutor">🤖 AI Tutor</button>
    <button class="mtab" id="mt-roadmap">🗺️ Roadmap</button>
    <button class="mtab" id="mt-notes">📝 Notes</button>
  </div>
</div>

<div id="tbar">
  <span class="tlbl">TOPIC</span>
  <button class="tbtn" data-topic="General">💬 General</button>
  <button class="tbtn" data-topic="Python">🐍 Python</button>
  <button class="tbtn" data-topic="JavaScript">⚡ JavaScript</button>
  <button class="tbtn" data-topic="HTML & CSS">🎨 HTML & CSS</button>
  <button class="tbtn" data-topic="C++">⚙️ C++</button>
  <button class="tbtn" data-topic="C">🔧 C</button>
  <button class="tbtn" data-topic="Java">☕ Java</button>
  <button class="tbtn" data-topic="SQL">🗄️ SQL</button>
  <button class="tbtn" data-topic="DSA">🧩 DSA</button>
  <button class="tbtn" data-topic="Git">🌿 Git</button>
</div>

<div id="chat"></div>

<div id="iarea">
  <div class="ictx">
    <span>Active:</span>
    <span class="ibadge" id="ibadge">🤖 AI Tutor</span>
    <span style="color:#252540">•</span>
    <span id="itopic">💬 General</span>
    <span style="color:#252540">•</span>
    <span id="ilang">English</span>
  </div>
  <div class="irow">
    <div class="iwrap" id="iwrap">
      <textarea id="inp" rows="1" placeholder="Ask any coding question..."></textarea>
    </div>
    <button id="sbtn" disabled>🚀</button>
  </div>
  <div class="ihint">Tap 🚀 or press Enter to send</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // ── BACKEND ──────────────────────────────────────────────────
  var BACKEND = "https://codesaathi-uc35.onrender.com";

  // ── STATE ────────────────────────────────────────────────────
  var lang  = "en";
  var level = "beginner";
  var topic = "General";
  var mode  = "tutor";
  var history  = [];
  var loading  = false;
  var notesTopic = "Notes";

  // ── DATA ─────────────────────────────────────────────────────
  var MC = {tutor:"#6366f1", roadmap:"#f97316", notes:"#10b981"};
  var LF = {en:"English", hi:"Hindi", mr:"Marathi"};
  var TI = {General:"💬",Python:"🐍",JavaScript:"⚡","HTML & CSS":"🎨","C++":"⚙️",C:"🔧",Java:"☕",SQL:"🗄️",DSA:"🧩",Git:"🌿"};
  var ME = {tutor:"🤖", roadmap:"🗺️", notes:"📝"};
  var ML = {tutor:"AI Tutor", roadmap:"Roadmap", notes:"Notes"};
  var MD = {
    tutor:   "Koi bhi coding concept simply samjha deta hoon. Pooch jo bhi man mein aaye!",
    roadmap: "Kisi bhi skill ka roadmap banata hoon — job-ready banne ke liye!",
    notes:   "Kisi bhi topic ke detailed notes banata hoon — download kar sakte ho!",
  };
  var QK = {
    tutor:   ["Variable kya hota hai? Real life example do","What is a function? Explain like I am 15","Loop kya hota hai? Simple example do","HTML aur CSS mein kya farak hai?","How to get a web dev job in India?","Array vs List difference kya hai?"],
    roadmap: ["Python roadmap for complete beginners","Web development roadmap to get a job","DSA roadmap for college placements","Full stack developer roadmap 2025","Data science roadmap for students"],
    notes:   ["Notes on Python basics","Notes on HTML and CSS","Notes on JavaScript arrays","Notes on OOP concepts","Notes on Git commands"],
  };
  var PH = {
    tutor:   {en:"Ask any coding question...", hi:"Koi bhi sawaal pooch...", mr:"Koni hi prashna vichar..."},
    roadmap: {en:"e.g. Python roadmap to get a job", hi:"e.g. Python roadmap do...", mr:"e.g. Python roadmap dya..."},
    notes:   {en:"e.g. Notes on JavaScript arrays", hi:"e.g. JS arrays ke notes banao", mr:"e.g. JS arrays notes banva..."},
  };

  // ── GET ELEMENTS ─────────────────────────────────────────────
  var inp    = document.getElementById("inp");
  var sbtn   = document.getElementById("sbtn");
  var iwrap  = document.getElementById("iwrap");
  var ibadge = document.getElementById("ibadge");
  var itopic = document.getElementById("itopic");
  var ilang  = document.getElementById("ilang");
  var chat   = document.getElementById("chat");
  var clr    = document.getElementById("clr");
  var lvlsel = document.getElementById("lvlsel");

  // ── SYSTEM PROMPT ────────────────────────────────────────────
  function buildSys() {
    var LR = {
      en: "You MUST respond ONLY in English. Do not use Hindi or Marathi.",
      hi: "You MUST respond ONLY in Hindi using Devanagari script. Technical words like variable, function, loop can stay in English but every sentence must be in Hindi.",
      mr: "You MUST respond ONLY in Marathi using Devanagari script. Technical words can stay in English but every sentence must be in Marathi.",
    }[lang];
    var LV = {
      beginner:     "Explain like a 10th standard student aged 15. Very simple words. Use Indian examples like chai, cricket, train. Be warm and encouraging.",
      intermediate: "Explain like a 1st or 2nd year college student. Technical terms ok but always explain them. Give short code examples.",
      advanced:     "Explain at professional developer level. Use correct terminology. Discuss best practices and edge cases.",
    }[level];
    if (mode === "roadmap") {
      return "You are CodeSaathi, a friendly Indian coding tutor.\nLANGUAGE RULE MANDATORY: " + LR + "\nLEVEL: " + LV + "\nGenerate a structured learning roadmap with phases, time estimates, resources, and job outcomes. Use **bold** for headings. Use emojis. Be specific for Indian students.";
    }
    if (mode === "notes") {
      return "You are CodeSaathi, a friendly Indian coding tutor.\nLANGUAGE RULE MANDATORY: " + LR + "\nLEVEL: " + LV + "\nTOPIC: " + topic + "\nGenerate complete study notes with numbered sections, definitions, code examples, and a summary. Use **bold** for key terms. Use triple backtick code blocks for code.";
    }
    return "You are CodeSaathi, a warm and friendly AI coding tutor for Indian students.\nLANGUAGE RULE MANDATORY: " + LR + "\nLEVEL: " + LV + "\nTOPIC FOCUS: " + topic + "\nExplain WHAT it is, WHY we use it, HOW it works. End with encouragement.\nUse **bold** for important terms. Use triple backtick code blocks for all code. Keep responses short and friendly.\nMISSION: Make every student feel Main bhi code kar sakta hoon!";
  }

  // ── UPDATE LANG BUTTONS ──────────────────────────────────────
  function updateLangButtons() {
    var ids = ["en","hi","mr"];
    for (var i = 0; i < ids.length; i++) {
      var btn = document.getElementById("lb-" + ids[i]);
      if (ids[i] === lang) {
        btn.style.background = MC[mode];
        btn.style.color = "#ffffff";
      } else {
        btn.style.background = "transparent";
        btn.style.color = "#55557a";
      }
    }
    ilang.textContent = LF[lang];
    inp.placeholder = PH[mode][lang];
  }

  // ── UPDATE MODE TABS ─────────────────────────────────────────
  function updateModeTabs() {
    var styles = {
      tutor:   {bg:"rgba(99,102,241,.15)",  color:"#818cf8", border:"rgba(99,102,241,.4)"},
      roadmap: {bg:"rgba(249,115,22,.15)",  color:"#fb923c", border:"rgba(249,115,22,.4)"},
      notes:   {bg:"rgba(16,185,129,.15)",  color:"#34d399", border:"rgba(16,185,129,.4)"},
    };
    var modes = ["tutor","roadmap","notes"];
    for (var i = 0; i < modes.length; i++) {
      var m = modes[i];
      var el = document.getElementById("mt-" + m);
      if (m === mode) {
        el.style.background   = styles[m].bg;
        el.style.color        = styles[m].color;
        el.style.borderColor  = styles[m].border;
      } else {
        el.style.background  = "transparent";
        el.style.color       = "#55557a";
        el.style.borderColor = "#1e1e34";
      }
    }
  }

  // ── UPDATE BADGE ─────────────────────────────────────────────
  function updateBadge() {
    ibadge.textContent      = ME[mode] + " " + ML[mode];
    ibadge.style.background = MC[mode] + "20";
    ibadge.style.border     = "1px solid " + MC[mode] + "50";
    ibadge.style.color      = MC[mode];
    iwrap.style.borderColor = "#1e1e34";
  }

  // ── SET LANG ─────────────────────────────────────────────────
  function setLang(l) {
    lang = l;
    updateLangButtons();
  }

  // ── SET MODE ─────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    history = [];
    updateModeTabs();
    updateLangButtons();
    updateBadge();
    inp.placeholder = PH[mode][lang];
    renderWelcome();
  }

  // ── SET TOPIC ────────────────────────────────────────────────
  function setTopic(t) {
    topic = t;
    var all = document.querySelectorAll(".tbtn");
    for (var i = 0; i < all.length; i++) {
      var btn = all[i];
      if (btn.getAttribute("data-topic") === t) {
        btn.style.borderColor = "#f97316";
        btn.style.background  = "rgba(249,115,22,.12)";
        btn.style.color       = "#f97316";
      } else {
        btn.style.borderColor = "#1e1e34";
        btn.style.background  = "transparent";
        btn.style.color       = "#55557a";
      }
    }
    itopic.textContent = (TI[t] || "💬") + " " + t;
  }

  // ── RENDER WELCOME ───────────────────────────────────────────
  function renderWelcome() {
    chat.innerHTML = "";
    clr.style.display = "none";

    var w = document.createElement("div");
    w.id = "wel";

    // Mode cards
    var cards = document.createElement("div");
    cards.className = "mcards";
    var modeList = [
      {id:"tutor",   ds:"Ask anything, get simple answers"},
      {id:"roadmap", ds:"Get a step-by-step learning path"},
      {id:"notes",   ds:"Generate and download study notes"},
    ];
    var ac = {tutor:"rgba(99,102,241,.1)", roadmap:"rgba(249,115,22,.1)", notes:"rgba(16,185,129,.1)"};
    var bc = {tutor:"rgba(99,102,241,.4)", roadmap:"rgba(249,115,22,.4)", notes:"rgba(16,185,129,.4)"};
    var tc = {tutor:"#818cf8", roadmap:"#fb923c", notes:"#34d399"};
    for (var i = 0; i < modeList.length; i++) {
      (function(m2) {
        var c = document.createElement("div");
        c.className = "mcard";
        if (mode === m2.id) {
          c.style.background   = ac[m2.id];
          c.style.borderColor  = bc[m2.id];
        }
        c.innerHTML = '<div class="mcard-ic">' + ME[m2.id] + '</div>'
          + '<div class="mcard-nm" style="color:' + (mode===m2.id ? tc[m2.id] : "var(--text)") + '">' + ML[m2.id] + '</div>'
          + '<div class="mcard-ds">' + m2.ds + '</div>';
        c.addEventListener("click", function() { setMode(m2.id); });
        cards.appendChild(c);
      })(modeList[i]);
    }
    w.appendChild(cards);

    // Title
    var tt = document.createElement("div");
    tt.className = "wtitle";
    tt.innerHTML = '<h2>Namaste! Main hoon <span style="color:#f97316">CodeSaathi</span> 👋</h2><p>' + MD[mode] + '</p>';
    w.appendChild(tt);

    // Pill
    var pill = document.createElement("div");
    pill.className = "cpill";
    pill.innerHTML = '<span>' + (TI[topic]||"💬") + " " + topic + '</span>'
      + '<span style="color:var(--border)">•</span>'
      + '<span>' + lvlsel.options[lvlsel.selectedIndex].text + '</span>'
      + '<span style="color:var(--border)">•</span>'
      + '<span>' + LF[lang] + '</span>';
    w.appendChild(pill);

    // Quick starters
    var qw = document.createElement("div");
    qw.className = "qwrap";
    var qs = QK[mode];
    for (var j = 0; j < qs.length; j++) {
      (function(q) {
        var btn = document.createElement("button");
        btn.className = "qbtn";
        btn.textContent = (mode==="tutor"?"💬":mode==="roadmap"?"🗺️":"📝") + " " + (q.length>36 ? q.slice(0,36)+"…" : q);
        btn.addEventListener("click", function() { sendMsg(q); });
        qw.appendChild(btn);
      })(qs[j]);
    }
    w.appendChild(qw);
    chat.appendChild(w);
  }

  // ── FORMAT ───────────────────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function fmtInline(t) {
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/`([^`]+)`/g,'<span class="ic">$1</span>');
  }
  function fmtMsg(text) {
    var html = "", last = 0, m;
    var re = /```(\w*)\n?([\s\S]*?)```/g;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) {
        html += fmtInline(text.slice(last, m.index)).replace(/\n/g,"<br>");
      }
      html += '<pre><code>' + (m[1] ? '<span class="clng">'+m[1]+'</span>' : '') + esc(m[2].trim()) + '</code></pre>';
      last = m.index + m[0].length;
    }
    if (last < text.length) {
      html += fmtInline(text.slice(last)).replace(/\n/g,"<br>");
    }
    return html;
  }

  // ── ADD MESSAGE ──────────────────────────────────────────────
  function addMsg(role, content, isNotes) {
    var w = document.getElementById("wel");
    if (w) w.remove();
    clr.style.display = "inline-block";

    var row = document.createElement("div");
    row.className = "msg " + (role==="ai" ? "a" : "u");

    var av = document.createElement("div");
    av.className = "av " + (role==="ai" ? "aav" : "uav");
    av.textContent = role==="ai" ? "🤖" : "🙂";

    var wrap = document.createElement("div");
    var bub = document.createElement("div");
    bub.className = "bub " + (role==="ai" ? "ab" : "ub");
    bub.innerHTML = role==="ai" ? fmtMsg(content) : esc(content).replace(/\n/g,"<br>");
    wrap.appendChild(bub);

    if (isNotes && role==="ai") {
      var dl = document.createElement("button");
      dl.className = "dlbtn";
      dl.innerHTML = "⬇️ Download Notes";
      dl.addEventListener("click", function() { dlNotes(content); });
      wrap.appendChild(dl);
    }

    row.appendChild(av);
    row.appendChild(wrap);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyp() {
    var t = document.createElement("div");
    t.id = "typ"; t.className = "typmsg";
    t.innerHTML = '<div class="av aav">🤖</div><div class="typdots"><div class="d"></div><div class="d"></div><div class="d"></div></div>';
    chat.appendChild(t);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyp() {
    var t = document.getElementById("typ");
    if (t) t.remove();
  }

  // ── SEND ─────────────────────────────────────────────────────
  function sendMsg(override) {
    var text = (override !== undefined ? override : inp.value).trim();
    if (!text || loading) return;
    if (mode === "notes") {
      notesTopic = topic !== "General" ? topic : text.replace(/notes on /i,"").slice(0,40);
    }
    loading = true;
    sbtn.disabled = true;
    addMsg("user", text);
    history.push({role:"user", content:text});
    inp.value = "";
    inp.style.height = "auto";
    showTyp();

    fetch(BACKEND + "/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({messages: history, system: buildSys()}),
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      hideTyp();
      if (data.error) {
        addMsg("ai", "⚠️ Error: " + data.error);
      } else {
        history.push({role:"assistant", content:data.reply});
        addMsg("ai", data.reply, mode === "notes");
      }
      loading = false;
      sbtn.disabled = false;
      inp.focus();
    })
    .catch(function() {
      hideTyp();
      addMsg("ai", "⚠️ Server is waking up. Please wait 30 seconds and try again.");
      loading = false;
      sbtn.disabled = false;
    });
  }

  // ── DOWNLOAD ─────────────────────────────────────────────────
  function dlNotes(content) {
    var clean = content
      .replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,l2,code){ return "\n---" + (l2||"CODE").toUpperCase() + "---\n" + code + "\n---\n"; })
      .replace(/\*\*([^*]+)\*\*/g,"$1")
      .replace(/`([^`]+)`/g,"$1");
    var blob = new Blob(["CODESAATHI NOTES\n==============================\nTopic: "+notesTopic+"\nDate: "+new Date().toLocaleDateString("en-IN")+"\nLang: "+LF[lang]+" | Level: "+level+"\n==============================\n\n"+clean], {type:"text/plain;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "CodeSaathi_" + notesTopic.replace(/\s+/g,"_") + ".txt";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(a.href);
  }

  // ── BIND LANGUAGE BUTTONS ─────────────────────────────────────
  document.getElementById("lb-en").addEventListener("click", function() { setLang("en"); });
  document.getElementById("lb-hi").addEventListener("click", function() { setLang("hi"); });
  document.getElementById("lb-mr").addEventListener("click", function() { setLang("mr"); });

  // ── BIND MODE TABS ────────────────────────────────────────────
  document.getElementById("mt-tutor").addEventListener("click",   function() { setMode("tutor"); });
  document.getElementById("mt-roadmap").addEventListener("click", function() { setMode("roadmap"); });
  document.getElementById("mt-notes").addEventListener("click",   function() { setMode("notes"); });

  // ── BIND TOPIC BUTTONS ────────────────────────────────────────
  var topicBtns = document.querySelectorAll(".tbtn");
  for (var i = 0; i < topicBtns.length; i++) {
    (function(btn) {
      btn.addEventListener("click", function() {
        setTopic(btn.getAttribute("data-topic"));
      });
    })(topicBtns[i]);
  }

  // ── BIND LEVEL ────────────────────────────────────────────────
  lvlsel.addEventListener("change", function() { level = this.value; });

  // ── BIND CLEAR ────────────────────────────────────────────────
  clr.addEventListener("click", function() { history = []; renderWelcome(); });

  // ── BIND INPUT ────────────────────────────────────────────────
  inp.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
    sbtn.disabled = !this.value.trim() || loading;
  });

  inp.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });

  inp.addEventListener("focus", function() { iwrap.style.borderColor = MC[mode]; });
  inp.addEventListener("blur",  function() { iwrap.style.borderColor = "#1e1e34"; });

  // ── BIND SEND BUTTON ──────────────────────────────────────────
  sbtn.addEventListener("click", function() { sendMsg(); });

  // ── INIT ──────────────────────────────────────────────────────
  setMode("tutor");
  setTopic("General");
  setLang("en");

});
</script>
</body>
</html>
